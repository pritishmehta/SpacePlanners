<!-- Contact Floating Stack -->
<div class="float-stack">
    <!-- WhatsApp Button (Top) -->
    <a href="https://wa.me/912240033385?text=Hi%20Space%20Planners%2C%20I%20want%20a%20quote%20for%20storage%20solutions"
        class="whatsapp-btn" target="_blank" rel="noopener" aria-label="Chat on WhatsApp" title="Chat on WhatsApp">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <image href="logos/whatsapp.svg" width="48" height="48" />
        </svg>
    </a>

    <!-- Quick Inquiry Button (Bottom) -->
    <button class="float-inquiry-btn" onclick="toggleFloatPopup(event)" aria-label="Quick inquiry" id="floatInqBtn"
        title="Get Free Quote">
        <span>💬</span>
    </button>
</div>

<!-- Quick Inquiry Mini Popup (Targeted by JS) -->
<div class="float-inquiry-popup" id="floatPopup" style="position:fixed; bottom:210px; right:28px; z-index:999;">
    <div class="popup-header">
        <p class="popup-title">Get Free Quote</p>
        <p class="popup-subtitle">We'll call within 2 hours</p>
        <button class="popup-close" onclick="toggleFloatPopup(event)" aria-label="Close popup">✕</button>
    </div>
    <div class="popup-body">
        <form id="floatInquiryForm" novalidate>
            <div class="form-group" style="margin-bottom: 5px;">
                <label for="pop-name" style="display:none;">Full Name</label>
                <input class="popup-input" type="text" id="pop-name" name="name" placeholder="Full Name *" required
                    style="margin-bottom:8px;">

                <label for="pop-email" style="display:none;">Email</label>
                <input class="popup-input" type="email" id="pop-email" name="email" placeholder="Email Address *"
                    required style="margin-bottom:8px;">

                <label for="pop-phone" style="display:none;">Phone</label>
                <input class="popup-input" type="tel" id="pop-phone" name="phone" placeholder="Phone Number *" required
                    style="margin-bottom:8px;">
                <select class="popup-input" id="pop-product" name="product_interest" required
                    style="margin-bottom:8px;">
                    <option value="">Select Product...</option>
                    <option value="Mobile Compactors">Mobile Compactors</option>
                    <option value="Industrial Racks">Industrial Racks</option>
                    <option value="Storage Lockers">Storage Lockers</option>
                    <option value="Filing Cabinets">Filing Cabinets</option>
                    <option value="Mezzanine Systems">Mezzanine Systems</option>
                    <option value="Other">Other</option>
                </select>

            <label for="pop-msg" style="display:none;">Message</label>
                <textarea class="popup-input" id="pop-msg" name="message" placeholder="Message (Optional)"
                    style="margin-bottom:8px; height:60px;"></textarea>
            </div>
            <button type="submit" class="popup-submit">Submit Inquiry &rarr;</button>
        </form>
    </div>
</div>

<div class="sp-mobile-cta-bar" id="spMobileCtaBar">
  <span class="sp-mobile-cta-text">Ready to maximise your space?</span>
  <button class="sp-mobile-cta-btn" onclick="openInquiryModal()">Get Free Quote &rarr;</button>
</div>

<script>
(function(){
  var bar = document.getElementById('spMobileCtaBar');
  if (!bar) return;
  window.addEventListener('scroll', function(){
    bar.classList.toggle('sp-mobile-cta-visible', window.scrollY > 400);
  }, { passive: true });
})();
</script>
