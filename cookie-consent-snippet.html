<!-- ===== COOKIE CONSENT BANNER ===== -->
<!-- Add this code just before closing </body> tag in all HTML files -->
<div id="cookieBanner" style="position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:white;padding:20px 40px;z-index:9999;display:none;box-shadow:0 -4px 20px rgba(0,0,0,0.3);">
    <div style="max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;">
        <div style="flex:1;min-width:200px;">
            <p style="margin:0 0 10px 0;font-weight:600;">🍪 We Use Cookies</p>
            <p style="margin:0;font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6;">We use cookies to improve your experience on our website. By continuing to browse, you consent to our use of cookies as described in our <a href="privacy-policy.html" style="color:#e53935;text-decoration:none;font-weight:600;">Privacy Policy</a>.</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button onclick="rejectCookies()" style="background:transparent;color:white;border:1px solid rgba(255,255,255,0.3);padding:8px 16px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.3s;">Reject</button>
            <button onclick="acceptCookies()" style="background:#e53935;color:white;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.3s;">Accept All</button>
        </div>
    </div>
</div>

<script>
// Cookie Consent Management
function initCookieConsent() {
    // Show banner if not already accepted/rejected
    if (!localStorage.getItem('cookie_consent')) {
        document.getElementById('cookieBanner').style.display = 'flex';
    }
}

function acceptCookies() {
    localStorage.setItem('cookie_consent', 'accepted');
    localStorage.setItem('cookie_consent_date', new Date().toISOString());
    document.getElementById('cookieBanner').style.display = 'none';

    // Enable analytics and tracking scripts
    gtag('consent', 'update', {
      'analytics_storage': 'granted'
    });
}

function rejectCookies() {
    localStorage.setItem('cookie_consent', 'rejected');
    localStorage.setItem('cookie_consent_date', new Date().toISOString());
    document.getElementById('cookieBanner').style.display = 'none';

    // Disable analytics and tracking
    gtag('consent', 'update', {
      'analytics_storage': 'denied'
    });
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', initCookieConsent);
</script>
