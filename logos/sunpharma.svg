<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <rect width="220" height="80" fill="white"/>
  <!-- Sun Pharma: orange sun with rays -->
  <g transform="translate(8, 5)">
    <!-- Sun rays -->
    <line x1="30" y1="4" x2="30" y2="12" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="10" x2="43" y2="17" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="28" x2="48" y2="30" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="46" x2="43" y2="40" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="52" x2="30" y2="44" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="46" x2="17" y2="40" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
    <line x1="4" y1="28" x2="12" y2="30" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="10" x2="17" y2="17" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
    <!-- Sun core -->
    <circle cx="30" cy="28" r="16" fill="#F7941D"/>
    <circle cx="30" cy="28" r="10" fill="#FDB913"/>
    <circle cx="30" cy="28" r="5" fill="white" opacity="0.6"/>
  </g>
  <text x="78" y="35" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#F7941D">SUN</text>
  <text x="78" y="55" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#003087">PHARMA</text>
</svg>
