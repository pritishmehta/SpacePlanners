<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <rect width="220" height="80" fill="white"/>
  <!-- AIIMS: Caduceus medical symbol in navy -->
  <g transform="translate(10, 6)">
    <!-- Staff -->
    <rect x="27" y="5" width="4" height="55" rx="2" fill="#003087"/>
    <!-- Wings -->
    <path d="M29 14 Q16 8 12 16 Q16 22 29 18Z" fill="#003087"/>
    <path d="M29 14 Q42 8 46 16 Q42 22 29 18Z" fill="#003087"/>
    <!-- Snake wraps -->
    <path d="M29 20 Q18 24 20 32 Q22 40 29 40" fill="none" stroke="#C5002E" stroke-width="3" stroke-linecap="round"/>
    <path d="M29 20 Q40 24 38 32 Q36 40 29 40" fill="none" stroke="#C5002E" stroke-width="3" stroke-linecap="round"/>
    <path d="M29 40 Q18 44 20 52 Q22 57 29 56" fill="none" stroke="#C5002E" stroke-width="3" stroke-linecap="round"/>
    <path d="M29 40 Q40 44 38 52 Q36 57 29 56" fill="none" stroke="#C5002E" stroke-width="3" stroke-linecap="round"/>
    <!-- Top circle -->
    <circle cx="29" cy="8" r="5" fill="#003087"/>
  </g>
  <text x="72" y="34" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#003087">AIIMS</text>
  <text x="72" y="50" font-family="Arial, sans-serif" font-size="7" fill="#003087">ALL INDIA INSTITUTE OF</text>
  <text x="72" y="61" font-family="Arial, sans-serif" font-size="7" fill="#003087">MEDICAL SCIENCES</text>
</svg>
