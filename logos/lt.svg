<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <rect width="220" height="80" fill="white"/>
  <!-- L&T: Bold red L&T with engineering triangle motif -->
  <g transform="translate(8, 8)">
    <!-- Triangle / engineering motif -->
    <polygon points="30,5 52,55 8,55" fill="none" stroke="#C8102E" stroke-width="4"/>
    <polygon points="30,18 45,50 15,50" fill="#C8102E" opacity="0.15"/>
    <!-- L&T text inside -->
    <text x="30" y="45" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#C8102E" text-anchor="middle">L&amp;T</text>
  </g>
  <text x="75" y="37" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#C8102E">L&amp;T</text>
  <text x="75" y="55" font-family="Arial, sans-serif" font-size="8" fill="#333" letter-spacing="0.3">LARSEN &amp; TOUBRO</text>
</svg>
