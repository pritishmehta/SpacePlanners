<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <rect width="220" height="80" fill="white"/>
  <!-- IIT Bombay: Gear / cog with academic torch -->
  <g transform="translate(6, 6)">
    <!-- Gear -->
    <circle cx="32" cy="34" r="18" fill="none" stroke="#003087" stroke-width="4"/>
    <circle cx="32" cy="34" r="9" fill="#003087"/>
    <circle cx="32" cy="34" r="4" fill="white"/>
    <!-- Gear teeth -->
    <rect x="29" y="12" width="6" height="8" rx="2" fill="#003087"/>
    <rect x="29" y="48" width="6" height="8" rx="2" fill="#003087"/>
    <rect x="10" y="31" width="8" height="6" rx="2" fill="#003087"/>
    <rect x="46" y="31" width="8" height="6" rx="2" fill="#003087"/>
    <rect x="15" y="17" width="8" height="6" rx="1.5" fill="#003087" transform="rotate(-45, 19, 20)"/>
    <rect x="43" y="17" width="8" height="6" rx="1.5" fill="#003087" transform="rotate(45, 47, 20)"/>
    <rect x="15" y="43" width="8" height="6" rx="1.5" fill="#003087" transform="rotate(45, 19, 46)"/>
    <rect x="43" y="43" width="8" height="6" rx="1.5" fill="#003087" transform="rotate(-45, 47, 46)"/>
    <!-- Torch flame on top -->
    <rect x="29" y="2" width="6" height="14" rx="3" fill="#FF6600"/>
    <path d="M32 2 Q28 -2 32 -6 Q36 -2 32 2Z" fill="#FFD700" transform="translate(0, 4)"/>
  </g>
  <text x="72" y="32" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#003087">IIT BOMBAY</text>
  <text x="72" y="48" font-family="Arial, sans-serif" font-size="8.5" fill="#003087">INDIAN INSTITUTE OF</text>
  <text x="72" y="60" font-family="Arial, sans-serif" font-size="8.5" fill="#003087">TECHNOLOGY</text>
</svg>
