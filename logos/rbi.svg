<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <rect width="220" height="80" fill="white"/>
  <!-- RBI: Ashoka Pillar / Lion capital with wheat stalks -->
  <g transform="translate(8, 5)">
    <!-- Pillar base -->
    <rect x="22" y="52" width="20" height="8" rx="2" fill="#4A3728"/>
    <rect x="20" y="58" width="24" height="5" rx="1" fill="#4A3728"/>
    <!-- Column -->
    <rect x="27" y="22" width="10" height="32" rx="2" fill="#8B6914"/>
    <!-- Lion capital circle -->
    <circle cx="32" cy="18" r="16" fill="#8B6914"/>
    <circle cx="32" cy="18" r="12" fill="#C4A030"/>
    <!-- Ashoka wheel -->
    <circle cx="32" cy="18" r="7" fill="none" stroke="#4A3728" stroke-width="2"/>
    <circle cx="32" cy="18" r="2" fill="#4A3728"/>
    <line x1="32" y1="11" x2="32" y2="25" stroke="#4A3728" stroke-width="1.2"/>
    <line x1="25" y1="18" x2="39" y2="18" stroke="#4A3728" stroke-width="1.2"/>
    <line x1="27" y1="13" x2="37" y2="23" stroke="#4A3728" stroke-width="1"/>
    <line x1="37" y1="13" x2="27" y2="23" stroke="#4A3728" stroke-width="1"/>
    <!-- Wheat stalks on sides -->
    <line x1="10" y1="56" x2="20" y2="30" stroke="#8B6914" stroke-width="2"/>
    <line x1="10" y1="46" x2="16" y2="32" stroke="#8B6914" stroke-width="1.5"/>
    <ellipse cx="20" cy="28" rx="4" ry="7" fill="#8B6914" transform="rotate(-20, 20, 28)"/>
    <line x1="54" y1="56" x2="44" y2="30" stroke="#8B6914" stroke-width="2"/>
    <ellipse cx="44" cy="28" rx="4" ry="7" fill="#8B6914" transform="rotate(20, 44, 28)"/>
  </g>
  <text x="76" y="38" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#4A3728">RBI</text>
  <text x="76" y="54" font-family="Arial, sans-serif" font-size="7.5" fill="#4A3728">RESERVE BANK</text>
  <text x="76" y="65" font-family="Arial, sans-serif" font-size="7.5" fill="#4A3728">OF INDIA</text>
</svg>
