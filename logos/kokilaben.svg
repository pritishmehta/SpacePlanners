<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <rect width="220" height="80" fill="white"/>
  <!-- Kokilaben: Purple/maroon cross / hospital mark -->
  <g transform="translate(8, 8)">
    <!-- Hospital plus cross -->
    <rect x="22" y="8" width="16" height="48" rx="4" fill="#6B2D8B"/>
    <rect x="8" y="22" width="46" height="16" rx="4" fill="#6B2D8B"/>
    <!-- Small heart at top -->
    <path d="M30 6 Q27 2 23 4 Q19 6 19 10 Q19 14 30 20 Q41 14 41 10 Q41 6 37 4 Q33 2 30 6Z" fill="#C5002E" transform="scale(0.7) translate(13, -2)"/>
  </g>
  <text x="72" y="33" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#6B2D8B">KOKILABEN</text>
  <text x="72" y="50" font-family="Arial Black, sans-serif" font-size="11" font-weight="700" fill="#6B2D8B">DHIRUBHAI</text>
  <text x="72" y="65" font-family="Arial, sans-serif" font-size="9" fill="#333">Ambani Hospital</text>
</svg>
