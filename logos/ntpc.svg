<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <rect width="220" height="80" fill="white"/>
  <!-- NTPC: Blue power transmission tower with lightning -->
  <g transform="translate(8, 4)">
    <!-- Tower structure -->
    <polygon points="30,5 45,65 15,65" fill="none" stroke="#003087" stroke-width="3"/>
    <!-- Cross braces -->
    <line x1="20" y1="25" x2="40" y2="25" stroke="#003087" stroke-width="2"/>
    <line x1="17" y1="42" x2="43" y2="42" stroke="#003087" stroke-width="2"/>
    <line x1="14" y1="58" x2="46" y2="58" stroke="#003087" stroke-width="2"/>
    <line x1="20" y1="25" x2="43" y2="42" stroke="#003087" stroke-width="1.5"/>
    <line x1="40" y1="25" x2="17" y2="42" stroke="#003087" stroke-width="1.5"/>
    <!-- Lightning bolt -->
    <polygon points="33,8 27,30 33,28 27,52 40,22 33,25 40,8" fill="#FFD700" transform="scale(0.75) translate(8,2)"/>
  </g>
  <text x="72" y="40" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#003087">NTPC</text>
  <text x="72" y="58" font-family="Arial, sans-serif" font-size="7.5" fill="#333" letter-spacing="0.3">NATIONAL THERMAL POWER</text>
  <text x="72" y="69" font-family="Arial, sans-serif" font-size="7.5" fill="#333" letter-spacing="0.3">CORPORATION</text>
</svg>
