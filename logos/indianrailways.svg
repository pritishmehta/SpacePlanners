<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <rect width="220" height="80" fill="white"/>
  <!-- Indian Railways: locomotive wheels on track -->
  <g transform="translate(6, 6)">
    <!-- Train body -->
    <rect x="2" y="20" width="52" height="26" rx="4" fill="#C5002E"/>
    <rect x="2" y="20" width="52" height="10" rx="4" fill="#003087"/>
    <!-- Windows -->
    <rect x="8" y="22" width="10" height="7" rx="2" fill="white" opacity="0.9"/>
    <rect x="23" y="22" width="10" height="7" rx="2" fill="white" opacity="0.9"/>
    <rect x="38" y="22" width="10" height="7" rx="2" fill="white" opacity="0.9"/>
    <!-- Front light -->
    <circle cx="56" cy="30" r="4" fill="#FFD700"/>
    <!-- Wheels -->
    <circle cx="14" cy="50" r="8" fill="#333" stroke="#FFD700" stroke-width="2"/>
    <circle cx="14" cy="50" r="3" fill="#FFD700"/>
    <circle cx="44" cy="50" r="8" fill="#333" stroke="#FFD700" stroke-width="2"/>
    <circle cx="44" cy="50" r="3" fill="#FFD700"/>
    <!-- Track line -->
    <line x1="0" y1="58" x2="65" y2="58" stroke="#666" stroke-width="3"/>
    <!-- Chimney -->
    <rect x="8" y="12" width="7" height="10" rx="2" fill="#003087"/>
    <!-- Steam puffs from chimney -->
    <circle cx="9" cy="9" r="4" fill="#ccc" opacity="0.7"/>
    <circle cx="15" cy="6" r="3" fill="#ccc" opacity="0.5"/>
  </g>
  <text x="80" y="36" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#003087" letter-spacing="0.5">INDIAN</text>
  <text x="80" y="50" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#C5002E" letter-spacing="0.5">RAILWAYS</text>
</svg>
