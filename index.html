<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Planners</title>
    <style>
        /* Custom styles to address the requested changes */
        header {
            width: 100%; /* Made header wider */
            text-align: center;
        }
        .carousel-dots {
            display: flex;
            justify-content: center; /* Center carousel dots */
            margin-top: 10px;
        }
        .client-logos {
            overflow-y: auto; /* Vertical scroll section for client logos */
            height: 200px; /* Set height for vertical scrolling */
        }
        .section-container {
            display: flex; /* To align sections side by side */
            justify-content: space-between;
            margin-top: 20px;
        }
        .section {
            width: 47%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Space Planners</h1>
    </header>
    <div class="carousel">
        <!-- Carousel Content -->
        <div class="carousel-dots"> <!-- Centered dots for carousel --> </div>
    </div>
    <section class="testimonials">
        <h2>Testimonials</h2>
        <!-- Testimonial content here -->
    </section>
    <div class="client-logos">
        <h3>Our Clients</h3>
        <!-- Client logos content to scroll vertically -->
    </div>
    <div class="section-container">
        <div class="section">
            <h3>Schedule a Free Space Assessment</h3>
            <!-- Content for space assessment -->
        </div>
        <div class="section">
            <h3>From Enquiry to Installation in 4 Steps</h3>
            <!-- Content for installation steps -->
        </div>
    </div>
</body>
</html>
