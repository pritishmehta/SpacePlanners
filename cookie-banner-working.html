<!-- ===== WORKING COOKIE CONSENT BANNER (COPY THIS TO ALL PAGES) ===== -->
<!-- Add this code in the <body> section of EVERY HTML page, right after <body> opening tag -->

<div id="cookieBanner" style="
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    color: white;
    padding: 20px 40px;
    z-index: 99999;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    font-family: 'Poppins', sans-serif;
    display: none;
    animation: slideUp 0.5s ease-out;
    border-top: 3px solid #e53935;
">
    <style>
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .cookie-content {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .cookie-text {
            flex: 1;
            min-width: 250px;
        }
        .cookie-text p {
            margin: 0;
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255,255,255,0.9);
        }
        .cookie-text strong {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        .cookie-text a {
            color: #e53935;
            text-decoration: none;
            font-weight: 600;
        }
        .cookie-text a:hover {
            text-decoration: underline;
        }
        .cookie-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            min-width: 200px;
            justify-content: flex-end;
        }
        .cookie-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap;
        }
        .cookie-btn-reject {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
        }
        .cookie-btn-reject:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.6);
        }
        .cookie-btn-accept {
            background: #e53935;
            color: white;
            border: none;
        }
        .cookie-btn-accept:hover {
            background: #c62828;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229,57,53,0.3);
        }
    </style>

    <div class="cookie-content">
        <div class="cookie-text">
            <strong>🍪 We Use Cookies</strong>
            <p>We use cookies and analytics to improve your experience and understand how you use our site. By continuing to browse, you consent to our <a href="privacy-policy-comprehensive.html" target="_blank">Privacy Policy</a> and <a href="terms-of-use.html" target="_blank">Terms of Use</a>.</p>
        </div>
        <div class="cookie-buttons">
            <button class="cookie-btn cookie-btn-reject" onclick="rejectCookies()">Reject</button>
            <button class="cookie-btn cookie-btn-accept" onclick="acceptCookies()">Accept All</button>
        </div>
    </div>
</div>

<script>
// ===== COOKIE CONSENT MANAGEMENT =====
function initCookieConsent() {
    // Check if consent already given (don't show again for 30 days)
    const consentTime = localStorage.getItem('cookie_consent_date');
    const now = new Date().getTime();
    const thirtyDaysMs = 30 * 24 * 60 * 60 * 1000;

    if (!consentTime || (now - parseInt(consentTime)) > thirtyDaysMs) {
        // Show banner
        const banner = document.getElementById('cookieBanner');
        if (banner) {
            banner.style.display = 'flex';
        }
    }
}

function acceptCookies() {
    localStorage.setItem('cookie_consent', 'accepted');
    localStorage.setItem('cookie_consent_date', new Date().getTime().toString());

    // Hide banner
    const banner = document.getElementById('cookieBanner');
    if (banner) {
        banner.style.animation = 'slideDown 0.5s ease-out forwards';
        setTimeout(() => {
            banner.style.display = 'none';
        }, 500);
    }

    // Enable Google Analytics
    if (typeof gtag !== 'undefined') {
        gtag('consent', 'update', {
            'analytics_storage': 'granted'
        });
    }

    console.log('✅ Cookies accepted');
}

function rejectCookies() {
    localStorage.setItem('cookie_consent', 'rejected');
    localStorage.setItem('cookie_consent_date', new Date().getTime().toString());

    // Hide banner
    const banner = document.getElementById('cookieBanner');
    if (banner) {
        banner.style.animation = 'slideDown 0.5s ease-out forwards';
        setTimeout(() => {
            banner.style.display = 'none';
        }, 500);
    }

    // Disable analytics
    if (typeof gtag !== 'undefined') {
        gtag('consent', 'update', {
            'analytics_storage': 'denied'
        });
    }

    console.log('❌ Cookies rejected');
}

// Initialize when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCookieConsent);
} else {
    initCookieConsent();
}

// Also initialize on page load
window.addEventListener('load', initCookieConsent);
</script>
